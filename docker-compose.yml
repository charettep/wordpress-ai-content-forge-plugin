# ── AI Content Forge — Local WordPress dev environment ─────────────────────────
#
#  Services  │ URL / purpose
#  ──────────┼──────────────────────────────────────────────────────────────────
#  wordpress │ http://localhost:8082  WordPress + Apache
#  db        │ MariaDB 11 (internal only)
#  phpmyadmin│ http://localhost:8081  DB browser (optional)
#  wpcli     │ docker compose run --rm wpcli <command>
#
#  First run:  docker compose up -d && ./docker-setup.sh
#  Daily use:  docker compose up -d   (or preview_start wordpress-local)
#  Teardown:   docker compose down -v   ← -v removes volumes (full reset)

services:

  # ── Database ──────────────────────────────────────────────────────────────────
  db:
    image: mariadb:11
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MARIADB_DATABASE:      wordpress
      MARIADB_USER:          wordpress
      MARIADB_PASSWORD:      wordpress
      MARIADB_ROOT_PASSWORD: rootpass
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost",
             "-u", "wordpress", "-pwordpress"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ── WordPress ─────────────────────────────────────────────────────────────────
  wordpress:
    image: wordpress:php8.2-apache
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      WORDPRESS_DB_HOST:     db
      WORDPRESS_DB_USER:     wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME:     wordpress
      WORDPRESS_DEBUG:       "1"
      WORDPRESS_DEBUG_LOG:   "1"
      WORDPRESS_DEBUG_DISPLAY: "0"
      # SCRIPT_DEBUG forces un-minified core JS/CSS — useful for sidebar debugging
      WORDPRESS_CONFIG_EXTRA: |
        define('SCRIPT_DEBUG', true);
        define('SAVEQUERIES', false);
    volumes:
      # WordPress core files live in a named volume so upgrades persist
      - wp_core:/var/www/html
      # Plugin is live-mounted — changes to PHP/CSS/built JS are instant
      - .:/var/www/html/wp-content/plugins/ai-content-forge
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/wp-login.php"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # ── WP-CLI (run-once helper) ──────────────────────────────────────────────────
  # Usage:  docker compose run --rm wpcli <wp subcommand>
  # e.g.:   docker compose run --rm wpcli plugin list
  #         docker compose run --rm wpcli option get siteurl
  wpcli:
    image: wordpress:cli
    depends_on:
      - db
      - wordpress
    volumes:
      - wp_core:/var/www/html
      - .:/var/www/html/wp-content/plugins/ai-content-forge
    user: "33:33"           # www-data — matches Apache; avoids root-owned files
    environment:
      WORDPRESS_DB_HOST:     db
      WORDPRESS_DB_USER:     wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME:     wordpress

  # ── phpMyAdmin (optional — comment out if unwanted) ────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    depends_on:
      - db
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: wordpress
      PMA_PASSWORD: wordpress

volumes:
  db_data:
  wp_core:
